# "Other Projects" section. Same shape as publications but with a subtitle/meta
# line instead of a venue. Optional highlight badge (with optional highlight_url).
- title: "Vorticity-Preserving Methods for Efficient Fluid Simulation"
  image: master_thesis.jpg
  subtitle: "Master Thesis at ETH Zurich, 2023"
  authors:
    - { name: "Vinicius Azevedo", label: "Supervisors:" }
    - { name: "Jingwei Tang" }
    - { name: "Markus Gross", url: "https://cgl.ethz.ch/people/grossm/" }
  highlight: "ETH Medal Award"
  highlight_url: "https://inf.ethz.ch/news-and-events/spotlights/infk-news-channel/2024/09/eth-medals-and-willi-studer-prizes-for-masters-graduates.html"
  abstract: >
    We explore new schemes for fluid simulation in order to improve energy and
    vorticity preservation capabilities. In particular, we propose novel Eulerian
    and Lagrangian frameworks based on the vorticity-streamfunction and the
    impulse formulations.

