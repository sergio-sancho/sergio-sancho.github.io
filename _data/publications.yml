# Add a publication by appending an entry here — no HTML editing needed.
# Fields:
#   title     (required)
#   image     filename in assets/images/   (use EITHER image OR video)
#   video     filename in assets/images/   (mp4, autoplays muted/looping)
#   authors   list of { name, url?, me? }  — set me: true for Sergio (bolded)
#   venue, year
#   highlight optional red badge text (e.g. "Oral Presentation")
#   abstract  short summary
#   links     list of { text, url }
#   writeup   optional { slug: <_projects filename without .md> } -> adds a write-up link

- title: "LookingGlass: Generative Anamorphoses via Laplacian Pyramid Warping"
  image: 2025_lookingglass.jpg
  authors:
    - { name: "Pascal Chang", url: "https://pascalchang87.github.io/" }
    - { name: "Sergio Sancho", me: true }
    - { name: "Jingwei Tang" }
    - { name: "Markus Gross", url: "https://cgl.ethz.ch/people/grossm/" }
    - { name: "Vinicius Azevedo" }
  venue: "CVPR"
  year: 2025
  highlight: "Oral Presentation"
  medal: false            # distinction, not an award -> no medal icon
  abstract: >
    We repurpose latent diffusion models to generate high-quality, complex,
    multi-view optical illusions such as anamorphoses.
  links:
    - { text: "arXiv", url: "#" }

